name: Compilar System Image OkcarOS (S7 Edge)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximizar Espaço em Disco
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 5120
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Limpeza Inicial de Resíduos
      run: |
        rm -rf okcar_source

    - name: Configurar Dependências do Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

    - name: Instalar Ferramenta Repo do Google
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configurar o Git
      run: |
        git config --global user.name "Seu Nome"
        git config --global user.email "seu-email@exemplo.com"

    - name: Sincronizar Código-Fonte (Modo Shallow Clone)
      run: |
        mkdir okcar_source && cd okcar_source
        
        # O SEGREDO TÁ AQUI: --depth=1 no init força o Android inteiro a baixar sem histórico
        repo init -u https://github.com/okcar-os/android.git -b okcar-2.0 --depth=1
        
        # Sync otimizado com poucas threads para não estourar RAM e economizar espaço
        repo sync -c -j4 --force-sync --no-clone-bundle --no-tags -v

    - name: Baixar Árvores do Galaxy S7 Edge (hero2lte)
      run: |
        cd okcar_source
        git clone https://github.com/LineageOS/android_device_samsung_hero2lte.git -b lineage-18.1 --depth=1 device/samsung/hero2lte
        git clone https://github.com/LineageOS/android_device_samsung_universal8890-common.git -b lineage-18.1 --depth=1 device/samsung/universal8890-common

    - name: Configurar Ambiente e Compilar a Imagem de Sistema
      run: |
        cd okcar_source
        source build/envsetup.sh
        
        # Seleciona o hardware do S7 Edge
        lunch lineage_hero2lte-userdebug
        
        # O comando focado apenas na partição que você quer instalar via TWRP
        make systemimage -j4
