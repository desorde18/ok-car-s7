name: Compilar OkcarOS

on:
  workflow_dispatch: # Permite que você clique em um botão no GitHub para iniciar manualmente

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximizar Espaço em Disco
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 5120
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true' # Remove o SDK padrão do runner para abrir espaço para a ROM
        remove-haskell: 'true'

    - name: Configurar Dependências do Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Instalar Ferramenta Repo do Google
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configurar o Git
      run: |
        git config --global user.name "Seu Nome"
        git config --global user.email "seu-email@exemplo.com"

    - name: Sincronizar Código-Fonte (Repo Sync)
      run: |
        mkdir okcar_source && cd okcar_source
        repo init -u https://github.com/okcar-os/android.git -b okcar-2.0
        # O sync baixa o default.xml e todos os repositórios, incluindo o 'okcar-os/okcar'
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Configurar Ambiente de Compilação do Android
      run: |
        cd okcar_source
        source build/envsetup.sh
        # Aqui você precisaria escolher o "lunch" específico do seu dispositivo/alvo
        # ex: lunch lineage_device-userdebug
        
    - name: Compilar
      run: |
        cd okcar_source
        # Comando para iniciar a compilação do Android (mka bacon, make, etc.)
        # echo "Iniciando compilação..."